version: 1
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        - npm ci
    build:
      commands:
        # Amplify Console에 등록된 환경변수를 .env.production으로 강제 기록.
        # 일부 서버사이드 변수가 Lambda 런타임에 누락되는 문제를 우회합니다.
        - |
          cat > .env.production << EOF
          NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY
          RESEND_API_KEY=$RESEND_API_KEY
          RESEND_FROM_EMAIL=$RESEND_FROM_EMAIL
          GROQ_API_KEY=$GROQ_API_KEY
          ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY
          OPENAI_API_KEY=$OPENAI_API_KEY
          GOOGLE_AI_API_KEY=$GOOGLE_AI_API_KEY
          GEMINI_API_KEY=$GEMINI_API_KEY
          NAVER_CLIENT_ID=$NAVER_CLIENT_ID
          NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
          NAVER_AD_CUSTOMER_ID=$NAVER_AD_CUSTOMER_ID
          NAVER_AD_ACCESS_LICENSE=$NAVER_AD_ACCESS_LICENSE
          NAVER_AD_SECRET_KEY=$NAVER_AD_SECRET_KEY
          CRON_SECRET=$CRON_SECRET
          YOUTUBE_API_KEY=$YOUTUBE_API_KEY
          INSTAGRAM_ACCESS_TOKEN=$INSTAGRAM_ACCESS_TOKEN
          INSTAGRAM_BUSINESS_ACCOUNT_ID=$INSTAGRAM_BUSINESS_ACCOUNT_ID
          TWITTER_BEARER_TOKEN=$TWITTER_BEARER_TOKEN
          GITHUB_REPO_OWNER=$GITHUB_REPO_OWNER
          GITHUB_REPO_SLUG=$GITHUB_REPO_SLUG
          GITHUB_TOKEN=$GITHUB_TOKEN
          EOF
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
